<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Resume — {{ template.name }}</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header bar ─────────────────────────────────────────── */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 24px;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
            flex-shrink: 0;
        }
        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.15rem; font-weight: 600; }
        .header-actions { display: flex; gap: 10px; align-items: center; }

        /* ── Buttons ────────────────────────────────────────────── */
        .btn {
            padding: 9px 18px;
            border-radius: 6px;
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity .2s, background .2s;
        }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .btn-ghost { background: rgba(255,255,255,.2); color: white; }
        .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,.3); }
        .btn-primary { background: white; color: #667eea; font-weight: 600; }
        .btn-primary:hover:not(:disabled) { background: #f0f0f0; }
        .btn-add {
            background: #eef1ff; color: #4a5de3;
            font-size: .8rem; padding: 5px 12px; border-radius: 5px;
            border: 1px dashed #aab4f0; cursor: pointer;
            margin-top: 8px;
        }
        .btn-add:hover { background: #dde3ff; }
        .btn-remove {
            background: none; border: none; cursor: pointer;
            color: #bbb; font-size: 1rem; line-height: 1;
            padding: 2px 5px; border-radius: 4px;
            transition: color .15s;
        }
        .btn-remove:hover { color: #e04e4e; }
        .btn-sm {
            padding: 4px 10px; font-size: .78rem; border-radius: 4px;
            cursor: pointer; border: 1px solid #dde2f0;
            background: #fafbff; color: #555;
        }
        .btn-sm:hover { background: #eef1ff; color: #4a5de3; border-color: #aab4f0; }
        .btn-warn {
            background: #fff7e6; color: #b36b00; border-color: #f5c06a;
        }
        .btn-warn:hover { background: #ffefd4; }
        .btn-success {
            background: #e6f7ee; color: #1a7a44; border-color: #7dcca0;
        }
        .btn-success:hover { background: #d0f0e0; }

        /* ── Workspace layout ───────────────────────────────────── */
        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(400px, 520px) 1fr;
            gap: 20px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        /* ── Panel shared styles ────────────────────────────────── */
        .form-panel {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-height: calc(100vh - 110px);
        }

        /* ── Tab bar ───────────────────────────────────────────── */
        .tab-bar {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
            flex-shrink: 0;
            background: #fafbff;
        }
        .tab-btn {
            padding: 11px 18px;
            font-size: .82rem;
            font-weight: 600;
            color: #999;
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color .15s;
        }
        .tab-btn:hover { color: #555; }
        .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-badge {
            display: inline-block;
            background: #e6f7ee;
            color: #1a7a44;
            border-radius: 10px;
            padding: 1px 7px;
            font-size: .68rem;
            margin-left: 5px;
        }
        .tab-badge.warn { background: #fff7e6; color: #b36b00; }

        .panel-header {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }
        .panel-header h2 { font-size: .95rem; color: #333; }
        .panel-actions { display: flex; gap: 6px; align-items: center; }
        .form-scroll { flex: 1; overflow-y: auto; padding: 16px; }
        .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* ── Form sections ──────────────────────────────────────── */
        .section-block {
            border: 1px solid #e8ecf4;
            border-radius: 8px;
            margin-bottom: 14px;
            overflow: hidden;
        }
        .section-title {
            background: #f5f7ff;
            padding: 8px 14px;
            font-size: .8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #667eea;
            border-bottom: 1px solid #e8ecf4;
        }
        .section-body { padding: 12px 14px; }

        /* ── Inputs ─────────────────────────────────────────────── */
        .field { margin-bottom: 9px; }
        .field label {
            display: block;
            font-size: .72rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: 3px;
        }
        .field input, .field textarea, .field select {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #dde2f0;
            border-radius: 5px;
            font-family: inherit;
            font-size: .875rem;
            color: #333;
            outline: none;
            transition: border-color .15s;
            background: #fafbff;
        }
        .field input:focus, .field textarea:focus, .field select:focus {
            border-color: #667eea;
            background: white;
        }
        .field textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        /* ── Repeatable entries ─────────────────────────────────── */
        .repeat-entry {
            border: 1px solid #e8ecf4;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
            position: relative;
            background: #fdfdff;
        }
        .repeat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .repeat-label {
            font-size: .7rem;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
        }

        /* ── Blueprint analysis tab ──────────────────────────────── */
        .bp-loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: .9rem;
        }
        .bp-error {
            text-align: center;
            padding: 24px 20px;
            color: #c44;
            font-size: .88rem;
        }
        .bp-section {
            border: 1px solid #e8ecf4;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .bp-section-title {
            background: #f5f7ff;
            padding: 8px 12px;
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bp-section-body { padding: 10px 12px; }

        /* Layout info */
        .bp-layout-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            border-radius: 12px;
            padding: 3px 12px;
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .04em;
            margin-bottom: 8px;
        }
        .bp-info-row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 5px;
            font-size: .82rem;
            color: #555;
        }
        .bp-info-label {
            font-weight: 600;
            color: #888;
            font-size: .75rem;
            min-width: 90px;
        }

        /* Section map editor */
        .col-section-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 8px;
        }
        .col-section-item {
            background: #f8f9fd;
            border: 1px solid #e0e4f4;
            border-radius: 5px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .82rem;
        }
        .col-section-item.identity { border-color: #b8d4f5; background: #edf4fd; }
        .col-section-item input[type="text"] {
            flex: 1;
            border: 1px solid #dde2f0;
            border-radius: 4px;
            padding: 3px 7px;
            font-size: .8rem;
            background: white;
        }
        .move-btn {
            background: none;
            border: 1px solid #dde2f0;
            border-radius: 3px;
            width: 22px; height: 22px;
            cursor: pointer;
            font-size: .75rem;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .move-btn:hover { background: #eef1ff; color: #667eea; }
        .type-badge {
            display: inline-block;
            background: #e8ecf4;
            border-radius: 4px;
            padding: 1px 7px;
            font-size: .72rem;
            font-weight: 600;
            color: #667eea;
            white-space: nowrap;
        }
        .type-badge.identity { background: #d0e8fb; color: #2563ab; }

        /* Element styles preview */
        .style-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 5px;
            margin: 3px;
            font-size: .78rem;
            border: 1px solid #e0e4f0;
        }
        .style-swatch {
            width: 12px; height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,.15);
            flex-shrink: 0;
        }

        /* Format settings */
        .format-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .format-row label {
            font-size: .78rem;
            font-weight: 600;
            color: #666;
            min-width: 130px;
        }
        .format-row select {
            flex: 1;
            padding: 5px 8px;
            border: 1px solid #dde2f0;
            border-radius: 4px;
            font-family: inherit;
            font-size: .82rem;
            background: #fafbff;
        }

        /* Save bar */
        .bp-save-bar {
            background: #f5f7ff;
            border-top: 1px solid #e8ecf4;
            padding: 10px 16px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }
        .bp-status {
            font-size: .8rem;
            color: #888;
            align-self: center;
            flex: 1;
        }

        /* ── Preview panel ──────────────────────────────────────── */
        .preview-panel {
            background: #3a3a3a;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0,0,0,.12);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 110px);
            overflow: hidden;
        }
        .preview-header {
            background: #2e2e2e;
            padding: 10px 16px;
            color: #ccc;
            font-size: .8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .preview-dot { width: 9px; height: 9px; border-radius: 50%; background: #888; }
        .preview-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #525659;
        }
        #resumePreview {
            background: white;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,.4);
            font-family: Helvetica, Arial, sans-serif;
        }
        /* Source PDF view */
        #sourceFrame {
            width: 100%;
            flex: 1;
            border: none;
            display: none;
            background: #525659;
        }
        /* Generated PDF preview (within Template Analysis) */
        #generatedFrame {
            width: 100%;
            flex: 1;
            border: none;
            display: none;
            background: #525659;
        }
        /* Right-panel toggle bar (Template vs Generated) */
        .right-panel-toggle {
            display: none;
            gap: 4px;
            padding: 6px 14px;
            background: #2e2e2e;
            border-top: 1px solid #444;
            flex-shrink: 0;
        }
        .right-panel-toggle button {
            flex: 1;
            padding: 5px 10px;
            font-size: .75rem;
            font-weight: 600;
            border: 1px solid #555;
            border-radius: 4px;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: background .15s, color .15s;
        }
        .right-panel-toggle button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .right-panel-toggle button:not(.active):hover {
            background: #444;
            color: #eee;
        }
        .source-panel { flex: 1; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <h1>Resume Builder — {{ template.name }}</h1>
        <div class="header-actions">
            <a href="/" class="btn btn-ghost">← Back</a>
            <button class="btn btn-primary" id="downloadBtn" onclick="downloadPDF()">
                <span id="downloadLabel">⬇ Generate PDF</span>
            </button>
        </div>
    </div>
</header>

<main class="workspace">

    <!-- Left: form + analysis tabs -->
    <section class="form-panel">
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-content-btn" onclick="switchTab('content')">
                Resume Content
            </button>
            <button class="tab-btn" id="tab-analysis-btn" onclick="switchTab('analysis')">
                Template Analysis
                {% if has_blueprint %}
                <span class="tab-badge">✓</span>
                {% else %}
                <span class="tab-badge warn">!</span>
                {% endif %}
            </button>
        </div>

        <!-- ── Resume Content tab ───────────────────────────────── -->
        <div class="tab-content active" id="tab-content">
            <div class="form-scroll" id="formScroll">

                <!-- Header / Name -->
                <div class="section-block">
                    <div class="section-title">Header</div>
                    <div class="section-body">
                        <div class="field">
                            <label>Full Name</label>
                            <input type="text" id="name" placeholder="Jane Smith" oninput="updatePreview()">
                        </div>
                        <div class="field">
                            <label>Title / Professional Tagline</label>
                            <input type="text" id="subtitle" placeholder="Software Engineer" oninput="updatePreview()">
                        </div>
                    </div>
                </div>

                <!-- Summary -->
                <div class="section-block">
                    <div class="section-title">Professional Summary</div>
                    <div class="section-body">
                        <div class="field">
                            <textarea id="summary" rows="3" placeholder="Brief professional overview…" oninput="updatePreview()"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Contact -->
                <div class="section-block">
                    <div class="section-title">Contact</div>
                    <div class="section-body">
                        <div class="field-row">
                            <div class="field">
                                <label>Email</label>
                                <input type="text" id="contact_email" oninput="updatePreview()">
                            </div>
                            <div class="field">
                                <label>Phone</label>
                                <input type="text" id="contact_phone" oninput="updatePreview()">
                            </div>
                        </div>
                        <div class="field-row">
                            <div class="field">
                                <label>Location</label>
                                <input type="text" id="contact_location" oninput="updatePreview()">
                            </div>
                            <div class="field">
                                <label>LinkedIn</label>
                                <input type="text" id="contact_linkedin" oninput="updatePreview()">
                            </div>
                        </div>
                        <div class="field">
                            <label>GitHub / Website</label>
                            <input type="text" id="contact_github" oninput="updatePreview()">
                        </div>
                    </div>
                </div>

                <!-- Experience -->
                <div class="section-block">
                    <div class="section-title">Experience</div>
                    <div class="section-body">
                        <div id="experienceEntries"></div>
                        <button class="btn-add" onclick="addExperience()">+ Add Position</button>
                    </div>
                </div>

                <!-- Technical Skills -->
                <div class="section-block">
                    <div class="section-title">Skills</div>
                    <div class="section-body">
                        <div id="skillEntries"></div>
                        <button class="btn-add" onclick="addSkill()">+ Add Category</button>
                    </div>
                </div>

                <!-- Education -->
                <div class="section-block">
                    <div class="section-title">Education</div>
                    <div class="section-body">
                        <div id="educationEntries"></div>
                        <button class="btn-add" onclick="addEducation()">+ Add Education</button>
                    </div>
                </div>

                <!-- Projects -->
                <div class="section-block">
                    <div class="section-title">Projects <span style="font-weight:400;color:#aaa;">(optional)</span></div>
                    <div class="section-body">
                        <div id="projectEntries"></div>
                        <button class="btn-add" onclick="addProject()">+ Add Project</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- ── Template Analysis tab ───────────────────────────── -->
        <div class="tab-content" id="tab-analysis">
            <div class="panel-header">
                <h2>Template Blueprint</h2>
                <div class="panel-actions">
                    <button class="btn-sm btn-warn" onclick="reextractBlueprint()" id="reextractBtn">↺ Re-extract</button>
                    <button class="btn-sm btn-success" onclick="saveCorrections()" id="saveCorrectionsBtn">✓ Save Corrections</button>
                    <button class="btn-sm btn-primary" onclick="generatePreview()" id="genPreviewBtn" style="background:#667eea;color:white;border-color:#667eea;">▶ Generate &amp; Preview</button>
                </div>
            </div>
            <div class="form-scroll" id="blueprintView">
                <div class="bp-loading">Loading blueprint…</div>
            </div>
            <div class="bp-save-bar">
                <span class="bp-status" id="bpStatus">Corrections are applied to the next generation.</span>
                <button class="btn-sm btn-success" onclick="saveCorrections()">Save Corrections</button>
            </div>
        </div>
    </section>

    <!-- Right: live preview / source PDF / generated PDF -->
    <section class="preview-panel">
        <div class="preview-header">
            <div class="preview-dot"></div>
            <span id="previewLabel">Live Preview — approximation of generated PDF</span>
        </div>
        <div class="preview-scroll" id="previewScroll">
            <div id="resumePreview"></div>
        </div>
        <iframe id="sourceFrame" src="/source-pdf/{{ template_id }}"></iframe>
        <iframe id="generatedFrame"></iframe>
        <div class="right-panel-toggle" id="rightPanelToggle">
            <button id="btnShowTemplate" onclick="showRightPanel('template')">Template PDF</button>
            <button id="btnShowGenerated" onclick="showRightPanel('generated')">Generated PDF</button>
        </div>
    </section>

</main>

<script>
    // ── Server-injected data ──────────────────────────────────────────────
    const TEMPLATE_ID = {{ template_id | tojson }};
    const THEME = {{ theme_css | tojson }};
    const HAS_BLUEPRINT = {{ has_blueprint | tojson }};

    // ── State ─────────────────────────────────────────────────────────────
    let eduCount = 0, skillCount = 0, expCount = 0, projCount = 0;
    let blueprintData = null;

    // ── Init ──────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        addEducation();
        addSkill();
        addExperience();
        updatePreview();
    });

    // ── Tab switching ─────────────────────────────────────────────────────

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById(`tab-${tab}-btn`).classList.add('active');

        const previewScroll = document.getElementById('previewScroll');
        const sourceFrame = document.getElementById('sourceFrame');
        const generatedFrame = document.getElementById('generatedFrame');
        const toggle = document.getElementById('rightPanelToggle');
        const previewLabel = document.getElementById('previewLabel');

        if (tab === 'analysis') {
            previewScroll.style.display = 'none';
            generatedFrame.style.display = 'none';
            sourceFrame.style.display = 'block';
            // Show toggle only if a generated preview already exists
            if (generatedFrame.src && generatedFrame.src !== window.location.href) {
                toggle.style.display = 'flex';
                document.getElementById('btnShowTemplate').classList.add('active');
                document.getElementById('btnShowGenerated').classList.remove('active');
            } else {
                toggle.style.display = 'none';
            }
            previewLabel.textContent = 'Template PDF';
            if (!blueprintData) loadBlueprint();
        } else {
            previewScroll.style.display = '';
            sourceFrame.style.display = 'none';
            generatedFrame.style.display = 'none';
            toggle.style.display = 'none';
            previewLabel.textContent = 'Live Preview — approximation of generated PDF';
        }
    }

    // ── Right-panel view control ──────────────────────────────────────────

    function showRightPanel(mode) {
        const sourceFrame = document.getElementById('sourceFrame');
        const generatedFrame = document.getElementById('generatedFrame');
        const toggle = document.getElementById('rightPanelToggle');
        const previewLabel = document.getElementById('previewLabel');
        toggle.style.display = 'flex';
        sourceFrame.style.display = mode === 'template' ? 'block' : 'none';
        generatedFrame.style.display = mode === 'generated' ? 'block' : 'none';
        document.getElementById('btnShowTemplate').classList.toggle('active', mode === 'template');
        document.getElementById('btnShowGenerated').classList.toggle('active', mode === 'generated');
        previewLabel.textContent = mode === 'generated' ? 'Generated PDF' : 'Template PDF';
    }

    // ── Generate & Preview (from Template Analysis tab) ────────────────────

    async function generatePreview() {
        const btn = document.getElementById('genPreviewBtn');
        btn.disabled = true;
        btn.textContent = 'Generating…';
        document.getElementById('bpStatus').textContent = 'Saving corrections…';
        try {
            await saveCorrections();
            document.getElementById('bpStatus').textContent = 'Generating PDF…';
            const content = collectContent();
            const res = await fetch(`/generate-structured/${TEMPLATE_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(content),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || res.statusText);
            }
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const frame = document.getElementById('generatedFrame');
            // Revoke the previous blob URL if one exists
            if (frame._blobUrl) URL.revokeObjectURL(frame._blobUrl);
            frame._blobUrl = url;
            frame.src = url;
            showRightPanel('generated');
            document.getElementById('bpStatus').textContent =
                '✓ Preview updated. Use the toggle above to compare Template vs Generated.';
        } catch (e) {
            document.getElementById('bpStatus').textContent = '⚠ Generate failed: ' + e.message;
        } finally {
            btn.disabled = false;
            btn.textContent = '▶ Generate & Preview';
        }
    }

    // ── Blueprint loading & rendering ──────────────────────────────────────

    async function loadBlueprint() {
        const view = document.getElementById('blueprintView');
        view.innerHTML = '<div class="bp-loading">Loading blueprint from server…</div>';
        try {
            const res = await fetch(`/blueprint/${TEMPLATE_ID}`);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: res.statusText }));
                view.innerHTML = `<div class="bp-error">⚠ ${err.error || 'Blueprint not available'}<br><br><button class="btn-sm btn-warn" onclick="reextractBlueprint()">↺ Extract from Template PDF</button></div>`;
                return;
            }
            blueprintData = await res.json();
            renderBlueprint(blueprintData);
        } catch (e) {
            view.innerHTML = `<div class="bp-error">⚠ ${e.message}</div>`;
        }
    }

    function renderBlueprint(bp) {
        const view = document.getElementById('blueprintView');
        let html = '';

        // ── Layout overview ─────────────────────────────────────────────
        const layoutType = bp.layout_type || 'single_column';

            <div class="bp-section-title">Layout</div>
            <div class="bp-section-body">
                <div class="format-row">

                    <select id="layoutType" onchange="applyLayoutChange(this.value)">

                        <option value="left_sidebar" ${layoutType==='left_sidebar'?'selected':''}>Left sidebar</option>
                        <option value="right_sidebar" ${layoutType==='right_sidebar'?'selected':''}>Right sidebar</option>
                    </select>
                </div>
                <div class="bp-info-row"><span class="bp-info-label">Page size</span>${Math.round(bp.page_width)} × ${Math.round(bp.page_height)} pt</div>
                <div class="bp-info-row"><span class="bp-info-label">Columns</span>${(bp.columns || []).length}</div>
                <div class="bp-info-row"><span class="bp-info-label">Background</span>${(bp.background_regions || []).length} region(s)</div>
                <div class="bp-info-row"><span class="bp-info-label">Line spacing</span>${(bp.line_spacing || 0).toFixed(1)} pt</div>
            </div>
        </div>`;

        // ── Format settings ─────────────────────────────────────────────
        const skillFmt = bp.skill_format || 'inline';

        const jobBodyFmt = bp.job_body_format || 'bullet';

            <div class="bp-section-title">Format Settings <small style="font-weight:400;color:#aaa;margin-left:6px;">(editable)</small></div>
            <div class="bp-section-body">
                <div class="format-row">
                    <label>Skills format</label>
                    <select id="fmtSkill">

                        <option value="heading_items" ${skillFmt==='heading_items'?'selected':''}>Heading + items list</option>
                        <option value="flat" ${skillFmt==='flat'?'selected':''}>Flat list (no categories)</option>
                    </select>
                </div>
                <div class="format-row">
                    <label>Job entry format</label>
                    <select id="fmtJob">
                        <option value="two_line" ${jobFmt==='two_line'?'selected':''}>Two lines (company/date, then role)</option>
                        <option value="combined" ${jobFmt==='combined'?'selected':''}>Combined (company · role · date)</option>
                        <option value="three_line" ${jobFmt==='three_line'?'selected':''}>Three lines (company, role, date)</option>
                    </select>
                </div>
                <div class="format-row">
                    <label>Job body format</label>
                    <select id="fmtJobBody">
                        <option value="bullet" ${jobBodyFmt==='bullet'?'selected':''}>Bullet points</option>
                        <option value="paragraph" ${jobBodyFmt==='paragraph'?'selected':''}>Paragraphs</option>
                    </select>
                </div>
            </div>
        </div>`;

        // ── Section map (editable) ───────────────────────────────────────
        const sectionMap = bp.section_map || {};
        const columns = bp.columns || [];
        html += `<div class="bp-section">
            <div class="bp-section-title">Section Map <small style="font-weight:400;color:#aaa;margin-left:6px;">(drag to reorder)</small></div>
            <div class="bp-section-body" id="sectionMapEditor">`;

        columns.forEach((col, colIdx) => {
            const colKey = `col_${colIdx}`;
            const sections = sectionMap[colKey] || [];
            const colLabel = columns.length > 1
                ? (colIdx === 0 ? 'Column 1 (left)' : 'Column 2 (right)')
                : 'Single column';
            html += `<div style="margin-bottom:10px;">
                <div style="font-size:.73rem;font-weight:700;color:#667eea;text-transform:uppercase;margin-bottom:5px;">${colLabel}</div>
                <div class="col-section-list" id="sectionList_${colKey}">`;
            sections.forEach((sec, secIdx) => {
                html += renderSectionItem(sec, colKey, secIdx, sections.length);
            });
            html += `</div>
                <button class="btn-add" style="margin-top:4px;" onclick="addSection('${colKey}')">+ Add Section</button>
            </div>`;
        });
        html += `</div></div>`;

        // ── Element styles ───────────────────────────────────────────────
        const es = bp.element_styles || {};
        if (Object.keys(es).length > 0) {
            html += `<div class="bp-section">
                <div class="bp-section-title">Detected Element Styles</div>
                <div class="bp-section-body">
                    <div style="display:flex;flex-wrap:wrap;">`;
            Object.entries(es).forEach(([type, style]) => {
                const color = style.color || [0,0,0];
                const bg = style.bg_color;
                const swatchBg = bg
                    ? `rgb(${Math.round(bg[0]*255)},${Math.round(bg[1]*255)},${Math.round(bg[2]*255)})`
                    : `rgb(${Math.round(color[0]*255)},${Math.round(color[1]*255)},${Math.round(color[2]*255)})`;
                const chipBg = bg
                    ? `rgba(${Math.round(bg[0]*255)},${Math.round(bg[1]*255)},${Math.round(bg[2]*255)},.12)`
                    : '#f5f7ff';
                html += `<div class="style-chip" style="background:${chipBg};">
                    <div class="style-swatch" style="background:${swatchBg};"></div>
                    <span style="font-weight:600;color:#555;">${type}</span>
                    <span style="color:#999;">${(style.size||0).toFixed(1)}pt${style.bold?' B':''}${style.italic?' I':''}</span>
                </div>`;
            });
            html += `</div></div></div>`;
        }

        view.innerHTML = html;

    function renderSectionItem(sec, colKey, idx, total) {
        const isIdentity = sec.type === 'identity';
        const itemClass = `col-section-item${isIdentity ? ' identity' : ''}`;
        const typeLabel = `<span class="type-badge${isIdentity ? ' identity' : ''}">${sec.type}</span>`;
        const upBtn = idx > 0
            ? `<button class="move-btn" title="Move up" onclick="moveSection('${colKey}',${idx},-1)">↑</button>`
            : `<button class="move-btn" style="visibility:hidden">↑</button>`;
        const downBtn = idx < total - 1
            ? `<button class="move-btn" title="Move down" onclick="moveSection('${colKey}',${idx},1)">↓</button>`
            : `<button class="move-btn" style="visibility:hidden">↓</button>`;
        const headingField = !isIdentity
            ? `<input type="text" placeholder="${sec.type.toUpperCase()}" value="${esc(sec.heading_text || '')}" onchange="updateSectionHeading('${colKey}',${idx},this.value)" title="Heading text">`
            : `<span style="color:#2563ab;font-size:.8rem;font-style:italic;">Name + Title</span>`;
        const removeBtn = `<button class="btn-remove" title="Remove section" onclick="removeSection('${colKey}',${idx})">✕</button>`;

        return `<div class="col-section-item${isIdentity ? ' identity' : ''}" data-col="${colKey}" data-idx="${idx}">
            ${typeLabel}
            ${headingField}
            ${upBtn}${downBtn}
            ${removeBtn}
        </div>`;
    }

    // ── Section map editing ────────────────────────────────────────────────

    function moveSection(colKey, idx, dir) {
        const sections = blueprintData.section_map[colKey];
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= sections.length) return;
        [sections[idx], sections[newIdx]] = [sections[newIdx], sections[idx]];
        renderBlueprint(blueprintData);
    }

    function removeSection(colKey, idx) {
        blueprintData.section_map[colKey].splice(idx, 1);
        renderBlueprint(blueprintData);
    }

    function updateSectionHeading(colKey, idx, value) {
        if (blueprintData.section_map[colKey]) {
            blueprintData.section_map[colKey][idx].heading_text = value;
        }
    }

    function addSection(colKey) {
        const type = prompt('Section type (e.g. skills, education, certifications, projects):');
        if (!type || !type.trim()) return;
        if (!blueprintData.section_map[colKey]) blueprintData.section_map[colKey] = [];
        blueprintData.section_map[colKey].push({ type: type.trim().toLowerCase(), heading_text: type.trim().toUpperCase() });
        renderBlueprint(blueprintData);
    }

    // ── Layout override ───────────────────────────────────────────────────

    function applyLayoutChange(newLayout) {
        if (!blueprintData) return;
        const pw = blueprintData.page_width || 612;
        const ph = blueprintData.page_height || 792;
        const margin = 28;
        const sbWidth = Math.round(pw * 0.28);
        const gap = 8;

        blueprintData.layout_type = newLayout;

        if (newLayout === 'single_column') {
            // Merge all column sections into a single full-width column
            const allSections = [];
            Object.values(blueprintData.section_map || {}).forEach(secs => {
                allSections.push(...secs);
            });
            // Deduplicate by type (in case both columns had the same section)
            const seen = new Set();
            const dedupSections = allSections.filter(s => {
                if (seen.has(s.type)) return false;
                seen.add(s.type);
                return true;
            });
            blueprintData.columns = [
                { id: 'col_0', x0: margin, x1: pw - margin, y_top: ph, y_bottom: margin }
            ];
            blueprintData.section_map = { col_0: dedupSections, col_1: [] };

        } else if (newLayout === 'left_sidebar') {
            const existingCol0 = (blueprintData.section_map || {}).col_0 || [];
            const existingCol1 = (blueprintData.section_map || {}).col_1 || [];
            blueprintData.columns = [
                { id: 'col_0', x0: 0, x1: sbWidth, y_top: ph, y_bottom: 0 },
                { id: 'col_1', x0: sbWidth + gap, x1: pw, y_top: ph, y_bottom: 0 }
            ];
            blueprintData.section_map = {
                col_0: existingCol0,
                col_1: existingCol1.length ? existingCol1 : []
            };

        } else if (newLayout === 'right_sidebar') {
            const existingCol0 = (blueprintData.section_map || {}).col_0 || [];
            const existingCol1 = (blueprintData.section_map || {}).col_1 || [];
            blueprintData.columns = [
                { id: 'col_0', x0: 0, x1: pw - sbWidth - gap, y_top: ph, y_bottom: 0 },
                { id: 'col_1', x0: pw - sbWidth, x1: pw, y_top: ph, y_bottom: 0 }
            ];
            blueprintData.section_map = {
                col_0: existingCol0,
                col_1: existingCol1.length ? existingCol1 : []
            };
        }

        renderBlueprint(blueprintData);
    }

    // ── Blueprint save ────────────────────────────────────────────────────

    async function saveCorrections() {
        if (!blueprintData) { alert('No blueprint loaded.'); return; }

        // Collect format settings (including layout corrections)
        const corrections = {
            layout_type: blueprintData.layout_type,
            columns: blueprintData.columns,
            section_map: blueprintData.section_map,
            skill_format: document.getElementById('fmtSkill')?.value || blueprintData.skill_format,
            job_entry_format: document.getElementById('fmtJob')?.value || blueprintData.job_entry_format,
            job_body_format: document.getElementById('fmtJobBody')?.value || blueprintData.job_body_format,
        };

        // Merge into blueprintData
        Object.assign(blueprintData, corrections);

        document.getElementById('bpStatus').textContent = 'Saving…';
        try {
            const res = await fetch(`/blueprint/${TEMPLATE_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(corrections),
            });
            if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || res.statusText);
            document.getElementById('bpStatus').textContent = '✓ Saved — corrections will be applied to next generation.';
        } catch (e) {
            document.getElementById('bpStatus').textContent = '⚠ Save failed: ' + e.message;
        }
    }

    async function reextractBlueprint() {
        const btn = document.getElementById('reextractBtn');
        btn.disabled = true;
        btn.textContent = 'Extracting…';
        document.getElementById('bpStatus').textContent = 'Re-extracting blueprint from PDF…';
        try {
            const res = await fetch(`/blueprint/${TEMPLATE_ID}/extract`, { method: 'POST' });
            if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || res.statusText);
            const data = await res.json();
            blueprintData = data.blueprint;
            renderBlueprint(blueprintData);
            document.getElementById('bpStatus').textContent = '✓ Blueprint re-extracted.';
        } catch (e) {
            document.getElementById('bpStatus').textContent = '⚠ Extraction failed: ' + e.message;
        } finally {
            btn.disabled = false;
            btn.textContent = '↺ Re-extract';
        }
    }

    // ── Collect form data ─────────────────────────────────────────────────

    function collectContent() {
        const content = {
            name: val('name'),
            title: val('subtitle'),
            subtitle: val('subtitle'),
            summary: val('summary'),
            contact: {
                email:    val('contact_email'),
                phone:    val('contact_phone'),
                location: val('contact_location'),
                linkedin: val('contact_linkedin'),
                github:   val('contact_github'),
            },
            education: [],
            skills: [],
            experience: [],
            projects: [],
        };

        // Education
        document.querySelectorAll('[id^="edu_degree_"]').forEach(el => {
            const sfx = el.id.replace('edu_degree_', '');
            const degree = val(`edu_degree_${sfx}`);
            const school = val(`edu_school_${sfx}`);
            const dates  = val(`edu_dates_${sfx}`);
            if (degree || school) content.education.push({ degree, school, dates });
        });

        // Skills
        document.querySelectorAll('[id^="skill_cat_"]').forEach(el => {
            const sfx = el.id.replace('skill_cat_', '');
            const category = val(`skill_cat_${sfx}`);
            const items    = val(`skill_items_${sfx}`);
            if (category || items) content.skills.push({ category, items });
        });

        // Experience
        document.querySelectorAll('[id^="exp_company_"]').forEach(el => {
            const sfx     = el.id.replace('exp_company_', '');
            const company = val(`exp_company_${sfx}`);
            const dates   = val(`exp_dates_${sfx}`);
            const role    = val(`exp_role_${sfx}`);
            const raw     = val(`exp_bullets_${sfx}`);
            const bullets = raw.split('\n').map(l => l.trim()).filter(Boolean);
            if (company || role || bullets.length) {
                content.experience.push({ company, dates, role, bullets });
            }
        });

        // Projects
        document.querySelectorAll('[id^="proj_name_"]').forEach(el => {
            const sfx   = el.id.replace('proj_name_', '');
            const name  = val(`proj_name_${sfx}`);
            const dates = val(`proj_dates_${sfx}`);
            const role  = val(`proj_role_${sfx}`);
            const raw   = val(`proj_bullets_${sfx}`);
            const bullets = raw.split('\n').map(l => l.trim()).filter(Boolean);
            if (name || bullets.length) {
                content.projects.push({ name, dates, role, bullets });
            }
        });

        return content;
    }

    function val(id) {
        const el = document.getElementById(id);
        return el ? el.value.trim() : '';
    }

    // ── Live preview ──────────────────────────────────────────────────────

    function updatePreview() {
        const c = collectContent();
        const t = THEME;
        const hbg  = t.accent_color || t.heading_bg || '#2c3e50';
        const sbg  = t.heading_bg || '#34495e';
        const htc  = '#ffffff';
        const body = t.body_color || '#222222';
        const nameSize    = parseInt(t.name_size || '22');
        const bodySize    = parseFloat(t.body_size || '9.5');
        const headingSize = 10;

        let html = '';

        // Header / name
        html += `<div style="background:${hbg};color:${htc};padding:14px 16px;text-align:center;">`;
        html += `<div style="font-size:${nameSize}px;font-weight:bold;line-height:1.2;">${esc(c.name || 'Your Name')}</div>`;
        if (c.title) html += `<div style="font-size:${bodySize + 1}px;margin-top:3px;">${esc(c.title)}</div>`;
        html += `</div>`;

        // Contact row
        const hasContact = Object.values(c.contact).some(v => v);
        if (hasContact) {
            html += `<div style="padding:6px 12px;color:${body};font-size:${bodySize}px;border-bottom:1px solid #eee;">`;
            const pieces = [c.contact.email, c.contact.phone, c.contact.location, c.contact.linkedin, c.contact.github].filter(Boolean);
            html += pieces.map(p => esc(p)).join(' &nbsp;|&nbsp; ');
            html += `</div>`;
        }

        // Summary
        if (c.summary) {
            html += sectionBar('Summary', sbg, htc, headingSize);
            html += `<div style="padding:5px 12px;font-size:${bodySize}px;color:${body};">${esc(c.summary)}</div>`;
        }

        // Experience
        if (c.experience.length) {
            html += sectionBar('Experience', sbg, htc, headingSize);
            html += `<div style="padding:5px 12px;font-size:${bodySize}px;color:${body};">`;
            for (const exp of c.experience) {
                html += `<div style="margin-bottom:6px;">`;
                if (exp.company || exp.dates) {
                    html += `<div style="display:flex;justify-content:space-between;">
                        <span style="font-weight:bold;">${esc(exp.company)}</span>
                        <span style="color:#777;">${esc(exp.dates)}</span>
                    </div>`;
                }
                if (exp.role) html += `<div style="font-style:italic;margin-bottom:2px;">${esc(exp.role)}</div>`;
                for (const b of exp.bullets) {
                    html += `<div style="padding-left:12px;">&bull; ${esc(b)}</div>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
        }

        // Skills
        if (c.skills.length) {
            html += sectionBar('Skills', sbg, htc, headingSize);
            html += `<div style="padding:5px 12px;font-size:${bodySize}px;color:${body};">`;
            for (const s of c.skills) {
                if (!s.category && !s.items) continue;
                if (s.category) html += `<b>${esc(s.category)}:</b> `;
                html += esc(s.items) + '<br>';
            }
            html += `</div>`;
        }

        // Education
        if (c.education.length) {
            html += sectionBar('Education', sbg, htc, headingSize);
            html += `<div style="padding:5px 12px;font-size:${bodySize}px;color:${body};">`;
            for (const edu of c.education) {
                html += `<div style="margin-bottom:5px;">`;
                if (edu.school || edu.dates) {
                    html += `<div style="display:flex;justify-content:space-between;">
                        <span style="font-weight:bold;">${esc(edu.school)}</span>
                        <span style="color:#777;">${esc(edu.dates)}</span>
                    </div>`;
                }
                if (edu.degree) html += `<div>${esc(edu.degree)}</div>`;
                html += `</div>`;
            }
            html += `</div>`;
        }

        // Projects
        if (c.projects.length) {
            html += sectionBar('Projects', sbg, htc, headingSize);
            html += `<div style="padding:5px 12px;font-size:${bodySize}px;color:${body};">`;
            for (const p of c.projects) {
                html += `<div style="margin-bottom:6px;">`;
                if (p.name) html += `<div style="font-weight:bold;">${esc(p.name)}</div>`;
                if (p.role) html += `<div style="font-style:italic;">${esc(p.role)}</div>`;
                for (const b of p.bullets) html += `<div style="padding-left:12px;">&bull; ${esc(b)}</div>`;
                html += `</div>`;
            }
            html += `</div>`;
        }

        document.getElementById('resumePreview').innerHTML = html;
    }

    function sectionBar(title, bg, tc, size) {
        return `<div style="background:${bg};color:${tc};font-weight:bold;font-size:${size}px;padding:4px 12px;text-transform:uppercase;">${esc(title)}</div>`;
    }

    function esc(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── PDF generation ────────────────────────────────────────────────────

    async function downloadPDF() {
        const btn   = document.getElementById('downloadBtn');
        const label = document.getElementById('downloadLabel');
        btn.disabled = true;
        label.textContent = '⏳ Generating…';

        const content = collectContent();

        try {
            const res = await fetch(`/generate-structured/${TEMPLATE_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(content),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: res.statusText }));
                alert('Generation failed: ' + (err.error || res.statusText));
                return;
            }

            const blob = await res.blob();
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = 'resume.pdf';
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(url);
            a.remove();
        } catch (err) {
            alert('Generation failed: ' + err.message);
        } finally {
            btn.disabled = false;
            label.textContent = '⬇ Generate PDF';
        }
    }
</script>
